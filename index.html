<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskr</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="container">
        <div class="header">
            <span class="tag">✦ YOUR TASKS</span>
            <h1>Get it <em>done.</em></h1>
            <p class="subtitle">Stay on top of everything that matters.</p>
        </div>
        <form class="task-form">
            <input type="text" name="task" id="task" placeholder="What needs to be done?" autocomplete="off">
            <button type="submit">ADD</button>
        </form>
        <div class="stats">
            <span id="count">0 tasks</span>
        </div>
        <div id="tasks"></div>
    </div>
    <script src="editor.js"></script>
</body>
</html>
